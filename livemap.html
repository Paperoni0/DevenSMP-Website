<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" href="assets/images/icons/favicon.ico" type="image/x-icon">
    <title>Live Map | DevenSMP</title>
    <link rel="stylesheet" type="text/css" href="css/livemap/ol.css">
    <link rel="stylesheet" href="css/livemap/ol-contextmenu.css">
    <link rel="stylesheet" type="text/css" href="css/livemap/toastify-js.min.css">
    <link rel="stylesheet" type="text/css" href="css/livemap/index.css">
    <script src="js/livemap/ol.js"></script>
    <script src="js/livemap/ol-contextmenu.iife.js"></script>
    <script type="text/javascript" src="js/livemap/toastify-js.js"></script>
    <script type="text/javascript" src="js/livemap/markers.js"></script>
    <script type="text/javascript" src="js/livemap/index.js"></script>
    <script type="text/javascript" src="js/livemap/properties.js"></script>
    <script type="text/javascript" src="js/livemap/regions.js"></script>
    <style>
        #sidebar {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 280px;
            background: rgba(10, 10, 15, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            display: flex;
            flex-direction: column;
            padding: 18px 14px 16px;
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 8px 0 40px rgba(0, 0, 0, 0.45);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
        }
        #sidebar.open {
            transform: translateX(0);
        }
        #sidebar-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.42);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
            backdrop-filter: blur(2px);
        }
        #sidebar-backdrop.visible {
            opacity: 1;
            pointer-events: all;
        }
        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 4px 18px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            margin-bottom: 14px;
        }
        .sidebar-title-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar-icon {
            width: 42px;
            height: 42px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.18), rgba(99, 102, 241, 0.18));
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }
        .sidebar-header-title {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.2px;
            line-height: 1.1;
        }
        .sidebar-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.55);
            margin-top: 4px;
            letter-spacing: 0.2px;
        }
        .sidebar-close {
            width: 38px;
            height: 38px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.18s ease;
            backdrop-filter: blur(6px);
        }
        .sidebar-close:hover {
            background: rgba(255, 255, 255, 0.09);
            color: white;
            transform: scale(1.05);
        }
        .sidebar-close:active {
            transform: scale(0.96);
        }
        .sidebar-close span {
            font-size: 16px;
            line-height: 1;
        }
        .sidebar-content {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 2px;
        }
        .dimension-btn {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            padding: 14px 14px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.04);
            color: #ddd;
            cursor: pointer;
            text-align: left;
            transition: all 0.22s ease;
            position: relative;
            overflow: hidden;
        }
        .dimension-btn::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.04), transparent);
            opacity: 0;
            transition: opacity 0.2s ease;
        }
        .dimension-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
            color: white;
        }
        .dimension-btn:hover::before {
            opacity: 1;
        }
        .dimension-btn.active {
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.22), rgba(99, 102, 241, 0.22));
            border: 1px solid rgba(56, 189, 248, 0.25);
            color: white;
            box-shadow: 0 10px 24px rgba(56, 189, 248, 0.12);
        }
        .dimension-text {
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        .dimension-name {
            font-size: 15px;
            font-weight: 600;
            color: inherit;
            line-height: 1.2;
        }
        .dimension-desc {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.58);
            margin-top: 4px;
            line-height: 1.2;
        }
        @media (max-width: 600px) {
            #sidebar {
                width: 86vw;
                max-width: 300px;
            }
            .sidebar-header-title {
                font-size: 17px;
            }
            .sidebar-icon,
            .dimension-emoji {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
    </style>
    <style>
        #maintenance-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #111827, #020617);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            animation: fadeIn 0.8s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
    
            to {
                opacity: 1;
            }
        }
        .maintenance-box {
            text-align: center;
            color: white;
            padding: 40px 50px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.6);
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        .maintenance-box h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        .maintenance-box p {
            font-size: 16px;
            opacity: 0.75;
        }
        .spinner {
            margin: 25px auto;
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.15);
            border-top: 5px solid #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: #38bdf8;
            filter: blur(120px);
            opacity: 0.2;
            animation: pulse 5s infinite ease-in-out;
        }
        @keyframes pulse {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.2;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.35;
            }
        }
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            opacity: 0.3;
            border-radius: 50%;
            animation: moveUp linear infinite;
        }
        @keyframes moveUp {
            from {
                transform: translateY(100vh);
                opacity: 0;
            }
            to {
                transform: translateY(-10vh);
                opacity: 0.5;
            }
        }
    </style>
</head>
<body>
    <div id="maintenance-overlay">
        <div class="glow"></div>
        <div id="particles"></div>
        <div class="maintenance-box">
            <h1>🚧 Under Maintenance</h1>
            <div class="spinner"></div>
            <p>We're upgrading the site.<br>Please come back later!</p>
        </div>
    </div>
    <div id="map"></div>
    <nav id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-title-wrap">
                <div class="sidebar-icon">🗺️</div>
                <div>
                    <div class="sidebar-header-title">Dimensions</div>
                    <div class="sidebar-subtitle">Switch dimension map</div>
                </div>
            </div>
            <button class="sidebar-close" id="close-btn" aria-label="Close sidebar">
                <span>✕</span>
            </button>
        </div>
        <div class="sidebar-content">
            <button class="dimension-btn active" data-dim="overworld">
                <span class="dimension-text">
                    <span class="dimension-name">Overworld</span>
                    <span class="dimension-desc">0 Player(s)</span>
                </span>
            </button>
            <button class="dimension-btn" data-dim="nether">
                <span class="dimension-text">
                    <span class="dimension-name">Nether</span>
                    <span class="dimension-desc">0 Player(s)</span>
                </span>
            </button>
            <button class="dimension-btn" data-dim="end">
                <span class="dimension-text">
                    <span class="dimension-name">The End</span>
                    <span class="dimension-desc">0 Player(s)</span>
                </span>
            </button>
        </div>
    </nav>
    <button id="map-toggle-btn" onclick="toggleSidebar()">
        <div id="toggle-icon"><span></span><span></span><span></span></div>
    </button>
    <script>
        const maintenanceMode = false;
        if (!maintenanceMode) {
            document.getElementById("maintenance-overlay").style.display = "none";
        }
        const particleContainer = document.getElementById("particles");
        for (let i = 0; i < 40; i++) {
            const p = document.createElement("div");
            p.className = "particle";
            p.style.left = Math.random() * 100 + "vw";
            p.style.animationDuration = (3 + Math.random() * 5) + "s";
            p.style.animationDelay = Math.random() * 5 + "s";
            particleContainer.appendChild(p);
        }
    </script>
    <script>
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.getElementById('sidebar-backdrop');
        const toggleBtn = document.getElementById('map-toggle-btn');
        function toggleSidebar() {
            const isOpen = sidebar.classList.toggle('open');
            backdrop.classList.toggle('visible', isOpen);
            toggleBtn.classList.toggle('open', isOpen);
        }
        function closeSidebar() {
            sidebar.classList.remove('open');
            backdrop.classList.remove('visible');
            toggleBtn.classList.remove('open');
        }
        document.getElementById('close-btn').addEventListener('click', closeSidebar);
        backdrop.addEventListener('click', closeSidebar);
        function selectWorld(key) {
            window.location.href = `?world=${key}`;
        }
    </script>
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        const supabase = createClient('https://mqprtorkbjflarpbjdrr.supabase.co', 'sb_publishable_mzn0G0K6Y1QGwi83TVweug_uETtafBU');
        const dimension = new URLSearchParams(window.location.search).get("dimension");
        if (UnminedCustomMarkers && UnminedCustomMarkers.isEnabled && UnminedCustomMarkers.markers) {
            UnminedMapProperties.markers = UnminedMapProperties.markers.concat(UnminedCustomMarkers.markers);
        }
        function buildMarkers(data) {
            return data
                .filter(p => p.username && p.username !== 'null' && p.x != null && p.z != null)
                .map(p => ({ name: p.username, x: p.x, z: p.z, image: p.image, online: p.online }));
        }
        async function init() {
            const { data, error } = await supabase
                .from('players')
                .select('username, x, z, image, online');
            if (error) return console.error(error);
            const playerMarkers = buildMarkers(data);
            if (playerMarkers.length > 0) {
                UnminedMapProperties.playerMarkers = Unmined.createPlayerMarkers(playerMarkers);
            }
            const mapElement = document.getElementById('map');
            window.unmined = new Unmined(mapElement, UnminedMapProperties, UnminedRegions);
            supabase
                .channel('players-changes')
                .on(
                    'postgres_changes',
                    { event: '*', schema: 'public', table: 'players' },
                    async () => {
                        const { data, error } = await supabase
                            .from('players')
                            .select('username, x, z, image, online');
                        if (error) return console.error(error);
                        const playerMarkers = buildMarkers(data);
                        if (playerMarkers.length > 0 && window.unmined?.playerMarkersLayer) {
                            const markers = Unmined.createPlayerMarkers(playerMarkers);
                            window.unmined.editMarkersLayer(window.unmined.playerMarkersLayer, markers);
                        }
                    }
                )
                .subscribe();
        }
        init();
    </script>
</body>
</html>

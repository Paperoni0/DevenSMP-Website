<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="icon" href="assets/images/icons/favicon.ico" type="image/x-icon">
    <title>Live Map | DevenSMP</title>
    <link rel="stylesheet" type="text/css" href="css/livemap/ol.css">
    <link rel="stylesheet" href="css/livemap/ol-contextmenu.css">
    <link rel="stylesheet" type="text/css" href="css/livemap/toastify-js.min.css">
    <link rel="stylesheet" type="text/css" href="css/livemap/index.css">
    <script src="js/livemap/ol.js"></script>
    <script src="js/livemap/ol-contextmenu.iife.js"></script>
    <script type="text/javascript" src="js/livemap/toastify-js.js"></script>
    <script type="text/javascript" src="js/livemap/markers.js"></script>
    <script type="text/javascript" src="js/livemap/index.js"></script>
    <script type="text/javascript" src="js/livemap/properties.js"></script>
    <script type="text/javascript" src="js/livemap/regions.js"></script>
    <style>
        #sidebar {
            position: fixed;
            top: 0; left: 0;
            height: 100vh;
            width: 220px;
            background: rgba(15, 15, 15, 0.92);
            backdrop-filter: blur(8px);
            display: flex;
            flex-direction: column;
            padding: 20px 0 16px;
            z-index: 1000;
            transform: translateX(-100%);
            transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 4px 0 24px rgba(0,0,0,0.4);
        }
        #sidebar.open { transform: translateX(0); }
        #sidebar-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }
        #sidebar-backdrop.visible { opacity: 1; pointer-events: all; }
        #map-toggle-btn {
            position: fixed;
            bottom: 20px; right: 20px;
            z-index: 1001;
            width: 44px; height: 44px;
            border-radius: 12px;
            background: rgba(15,15,15,0.88);
            border: 0.5px solid rgba(255,255,255,0.18);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(6px);
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
            transition: background 0.15s, transform 0.1s;
        }
        #map-toggle-btn:hover { background: rgba(40,40,40,0.95); transform: scale(1.05); }
        #map-toggle-btn:active { transform: scale(0.97); }
        #toggle-icon { display: flex; flex-direction: column; gap: 4px; }
        #toggle-icon span {
            display: block; width: 18px; height: 1.5px;
            background: #fff; border-radius: 2px;
            transition: transform 0.2s, opacity 0.2s;
            transform-origin: center;
        }
        #map-toggle-btn.open #toggle-icon span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
        #map-toggle-btn.open #toggle-icon span:nth-child(2) { opacity: 0; transform: scaleX(0); }
        #map-toggle-btn.open #toggle-icon span:nth-child(3) { transform: translateY(-5.5px) rotate(-45deg); }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="sidebar-backdrop"></div>
    <nav id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-header-title">Switch Dimension</span>
            <button class="sidebar-close" id="close-btn">✕</button>
        </div>
        <ul id="sidebar-list">
                <li> 
                <a class="dimension-btn" href="?dimension=overworld">
                <span class="dimension-label">Overworld</span>
                </a>
                <a class="dimension-btn" href="?dimension=nether">
                <span class="dimension-label">Nether</span>
                </a>
                <a class="dimension-btn" href="?dimension=end">
                <span class="dimension-label">The End</span>
                </a>
                </li>
        </ul>
    </nav>
    <button id="map-toggle-btn" onclick="toggleSidebar()">
        <div id="toggle-icon"><span></span><span></span><span></span></div>
    </button>
    <script>
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.getElementById('sidebar-backdrop');
        const toggleBtn = document.getElementById('map-toggle-btn');
        function toggleSidebar() {
            const isOpen = sidebar.classList.toggle('open');
            backdrop.classList.toggle('visible', isOpen);
            toggleBtn.classList.toggle('open', isOpen);
        }
        function closeSidebar() {
            sidebar.classList.remove('open');
            backdrop.classList.remove('visible');
            toggleBtn.classList.remove('open');
        }
        document.getElementById('close-btn').addEventListener('click', closeSidebar);
        backdrop.addEventListener('click', closeSidebar);
        function selectWorld(key) {
            window.location.href = `?world=${key}`;
        }
    </script>
    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
        const supabase = createClient('https://mqprtorkbjflarpbjdrr.supabase.co', 'sb_publishable_mzn0G0K6Y1QGwi83TVweug_uETtafBU');
        const dimension = new URLSearchParams(window.location.search).get("dimension");
        if (UnminedCustomMarkers && UnminedCustomMarkers.isEnabled && UnminedCustomMarkers.markers) {
            UnminedMapProperties.markers = UnminedMapProperties.markers.concat(UnminedCustomMarkers.markers);
        }
        function buildMarkers(data) {
            return data
                .filter(p => p.username && p.username !== 'null' && p.x != null && p.z != null)
                .map(p => ({ name: p.username, x: p.x, z: p.z, image: p.image, online: p.online }));
        }
        async function init() {
            const { data, error } = await supabase
                .from('players')
                .select('username, x, z, image, online');
            if (error) return console.error(error);
            const playerMarkers = buildMarkers(data);
            if (playerMarkers.length > 0) {
                UnminedMapProperties.playerMarkers = Unmined.createPlayerMarkers(playerMarkers);
            }
            const mapElement = document.getElementById('map');
            window.unmined = new Unmined(mapElement, UnminedMapProperties, UnminedRegions);
            supabase
                .channel('players-changes')
                .on(
                    'postgres_changes',
                    { event: '*', schema: 'public', table: 'players' },
                    async () => {
                        const { data, error } = await supabase
                            .from('players')
                            .select('username, x, z, image, online');
                        if (error) return console.error(error);
                        const playerMarkers = buildMarkers(data);
                        if (playerMarkers.length > 0 && window.unmined?.playerMarkersLayer) {
                            const markers = Unmined.createPlayerMarkers(playerMarkers);
                            window.unmined.editMarkersLayer(window.unmined.playerMarkersLayer, markers);
                        }
                    }
                )
                .subscribe();
        }
        init();
    </script>
</body>
</html>

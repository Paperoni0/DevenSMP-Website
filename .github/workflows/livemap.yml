name: live-map-update

permissions:
  contents: write

on:
  schedule:
    - cron: "0 0,12 * * *"
  workflow_dispatch:

env:
  LIVEMAP_DIR: .github/livemap
  WORLD_PATH: .github/livemap/worlds/DevenSMP
  UNMINED: ./.github/unmined/unmined-cli
  RENDER_FLAGS: --shadows=true --imageformat=webp --zoomout=-3 --zoomin=1

jobs:
  update-map:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download world backup
        env:
          SERVER_ID: ${{ secrets.PTERODACTYL_SERVERID }}
          API_KEY: ${{ secrets.PTERODACTYL_APIKEY }}
        run: |
          BASE_URL="https://panel.freezehost.pro/api/client/servers/$SERVER_ID"
          AUTH_HEADERS=(-H "Authorization: Bearer $API_KEY" -H "Accept: Application/vnd.pterodactyl.v1+json")

          UUID=$(curl -sf "${BASE_URL}/backups" "${AUTH_HEADERS[@]}" | \
            jq -r '[.data[] | select(.attributes.is_successful)] | sort_by(.attributes.created_at) | last | .attributes.uuid')

          [ -z "$UUID" ] && echo "No successful backup found" && exit 1

          DOWNLOAD_LINK=$(curl -sf "${BASE_URL}/backups/${UUID}/download" "${AUTH_HEADERS[@]}" | \
            jq -r '.attributes.url')

          mkdir -p "$LIVEMAP_DIR"
          curl -L --retry 3 --retry-delay 5 "$DOWNLOAD_LINK" -o "$LIVEMAP_DIR/world.tar.gz"
          tar -xzf "$LIVEMAP_DIR/world.tar.gz" -C "$LIVEMAP_DIR"

      - name: Generate map tiles
        run: |
          for dim in overworld nether; do
            "$UNMINED" web render \
              --world="$WORLD_PATH" \
              --output="$LIVEMAP_DIR/$dim" \
              --dimension=$dim \
              $RENDER_FLAGS
          done

      - name: Move tiles and properties
        run: |
          for dim in overworld nether; do
            rm -rf "assets/images/livemap/$dim/tiles"
            mv "$LIVEMAP_DIR/$dim/tiles" "assets/images/livemap/$dim/tiles"

            for file in properties regions; do
              rm -f "js/livemap/$dim/$file.js"
              mv "$LIVEMAP_DIR/$dim/unmined.map.$file.js" "js/livemap/$dim/$file.js"
            done
          done

      - name: Commit and push changes
        run: |
          rm -rf "$LIVEMAP_DIR"
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git config --global http.postBuffer 524288000
          git config --global http.lowSpeedLimit 0
          git config --global http.lowSpeedTime 600
          git add .
          git diff --cached --quiet || git commit -m "Updated live map $(date -u '+%Y-%m-%d %H:%M UTC')" && git push origin main
